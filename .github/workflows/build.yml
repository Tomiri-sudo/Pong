name: Build Android APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Java Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Fetch Pure Native SDL2 Framework
        run: |
          # Download a clean tarball zip to keep git index completely untracked
          curl -L https://github.com/libsdl-org/SDL/archive/refs/heads/SDL2.tar.gz -o sdl2.tar.gz
          tar -xzf sdl2.tar.gz
          mv SDL-SDL2 sdl2-source
          
          # Map standard compilation directories
          mkdir -p app/jni
          cp -r sdl2-source/android-project/* .
          cp -r sdl2-source app/jni/sdl
          rm -rf sdl2-source sdl2.tar.gz

      - name: Inject Game Logic
        run: |
          mkdir -p app/jni/src
          rm -rf app/jni/src/*
          cp main.cpp app/jni/src/main.cpp
          rm -f app/src/main/java/org/libsdl/app/SDLInputConnection.java

      - name: Build Standalone APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug -Pandroid.injected.build.abi="arm64-v8a,armeabi-v7a"

      - name: Upload Finished Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pong-Game-APK
          path: "**/build/outputs/apk/**/*.apk"
